name: 📝 Make Build Check

on:
  push:
    branches: [main]
    paths:
      - 'Makefile'
      - 'src/**'
  pull_request:
    branches: [main]
    paths:
      - 'Makefile'
      - 'src/**'
  workflow_dispatch:

jobs:
  run:
    name: 📝 Make Build Check
    runs-on: ubuntu-latest # linux required if you want to use docker
    container:
      image: walkero/docker4amigavbcc:latest-m68k
      volumes:
        - '${{ github.workspace }}:/opt/code'
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v2
      - name: Make sure we have clang-format installed
        run: |
          apt-get update
          apt-get install -y clang-format
      - name: 🏃 Running Make
        run: make
      - name: 🏃 Running format check
        run: |
          make format
          git diff --exit-code
